<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="token.pageTitle">Grok2API - Token 管理</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/admin/css/token.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <!-- Main Content -->
  <main class="space-y-6 flex-1 w-full max-w-6xl mx-auto px-6 py-8 fade-in">

    <div class="space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">概览</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">Token 用量与状态监控</p>
        </div>
      </div>

      <div class="h-px bg-[var(--border)] my-6"></div>

      <!-- Statistics -->
      <div class="grid grid-cols-4 gap-4 mb-4" id="stats-container">
        <!-- 账号统计 -->
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">Token 总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-green-600" id="stat-active">-</div>
          <div class="stat-label">Token 正常</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-orange-500" id="stat-cooling">-</div>
          <div class="stat-label">Token 限流</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-red-600" id="stat-invalid">-</div>
          <div class="stat-label">Token 失效</div>
        </div>
      </div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        <!-- 用量统计 -->
        <div class="stat-card">
          <div class="stat-value" id="stat-chat-quota">-</div>
          <div class="stat-label" data-i18n="token.statChatQuota">Chat 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-blue-600" id="stat-image-quota">-</div>
          <div class="stat-label" data-i18n="token.statImageQuota">Image 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-gray-400" id="stat-video-quota" data-i18n="token.statVideoUnavailable">无法统计</div>
          <div class="stat-label" data-i18n="token.statVideoQuota">Video 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total-calls">-</div>
          <div class="stat-label" data-i18n="token.statTotalCalls">总调用次数</div>
        </div>
      </div>

    </div>
  </main>
  <div id="app-footer"></div>

  <!-- Import Modal (kept for token.js compatibility) -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal-content modal-lg" id="import-modal-content">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="token.importTitle">批量导入 Token</h3>
        <button onclick="closeImportModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.importTargetPool">目标 Pool</label>
          <select id="import-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
            <option value="ssoHeavy">ssoHeavy</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.importTokenList">Token 列表 (每行一个)</label>
          <textarea id="import-text" class="geist-input font-mono h-48"
            placeholder="粘贴 Token，一行一个..." data-i18n-placeholder="token.importPlaceholder"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeImportModal()" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button onclick="submitImport()" class="geist-button text-xs px-3" data-i18n="token.startImport">开始导入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content modal-md" id="edit-modal-content">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="token.editTitle">编辑 Token</h3>
        <button onclick="closeEditModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <input type="hidden" id="edit-original-token">
        <input type="hidden" id="edit-original-pool">
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.tableToken">Token</label>
          <input type="text" id="edit-token-display" class="geist-input font-mono bg-gray-50 text-gray-500"
            disabled>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editType">类型</label>
          <select id="edit-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
            <option value="ssoHeavy">ssoHeavy</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editQuota">额度</label>
          <input type="number" id="edit-quota" class="geist-input" min="0">
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editNote">备注</label>
          <input type="text" id="edit-note" class="geist-input" placeholder="可选备注" data-i18n-placeholder="token.editNotePlaceholder" maxlength="50">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeEditModal()" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button onclick="saveEdit()" class="geist-button text-xs px-3" data-i18n="common.save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay confirm-dialog hidden">
    <div class="modal-content modal-md">
      <div class="confirm-dialog-body">
        <div class="confirm-dialog-title" data-i18n="common.pleaseConfirm">请确认</div>
        <div id="confirm-message" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-actions">
          <button id="confirm-cancel" type="button" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button id="confirm-ok" type="button" class="geist-button-danger text-xs px-3" data-i18n="common.ok">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common/js/draggable.js"></script>
  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/batch-sse.js?v=1.6.2"></script>
  <script src="/static/common/js/header.js?v=1.7.3"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/token.js?v=1.6.3"></script>
</body>

</html>
