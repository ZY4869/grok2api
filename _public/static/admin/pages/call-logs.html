<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调用日志 - Grok2API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/common/css/common.css?v=1.7.0">
  <link rel="stylesheet" href="/static/admin/css/token.css?v=1.7.0">
  <link rel="stylesheet" href="/static/admin/css/call-logs.css?v=1.7.0">
  <link rel="stylesheet" href="/static/common/css/toast.css">
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="app-header"></div>
  <main class="space-y-6 flex-1 container mx-auto max-w-6xl px-6 py-8 fade-in" style="padding-top: 5rem;">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div>
        <h2 class="text-2xl font-semibold">调用日志</h2>
        <p class="text-[var(--accents-4)] mt-1 text-sm">查看逐次调用明细、账号聚合次数、模型与耗时。</p>
      </div>
      <button id="clear-call-logs-btn" type="button" class="geist-button-danger text-xs px-3" onclick="clearCallLogs()">
        一键清空日志
      </button>
    </div>

    <section class="call-log-panel">
      <div class="call-log-filters">
        <label>
          <span>状态</span>
          <select id="filter-status" class="geist-input">
            <option value="">全部</option>
            <option value="success">成功</option>
            <option value="fail">失败</option>
          </select>
        </label>
        <label>
          <span>接口类型</span>
          <input id="filter-api-type" class="geist-input" type="text" placeholder="例如 chat.completions">
        </label>
        <label>
          <span>模型</span>
          <input id="filter-model" class="geist-input" type="text" placeholder="例如 grok-3">
        </label>
        <label>
          <span>账号关键字</span>
          <input id="filter-account" class="geist-input" type="text" placeholder="Email / Token / Pool">
        </label>
        <label>
          <span>开始日期</span>
          <input id="filter-date-from" class="geist-input" type="date">
        </label>
        <label>
          <span>结束日期</span>
          <input id="filter-date-to" class="geist-input" type="date">
        </label>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <button type="button" class="geist-button text-xs px-3" onclick="applyFilters()">查询</button>
        <button type="button" class="geist-button-outline text-xs px-3" onclick="resetFilters()">重置</button>
        <span id="call-logs-status" class="text-xs text-[var(--accents-4)]"></span>
      </div>
    </section>

    <section class="call-log-summary-grid">
      <article class="call-log-summary-card">
        <span class="call-log-summary-label">总调用</span>
        <strong id="summary-total">0</strong>
      </article>
      <article class="call-log-summary-card">
        <span class="call-log-summary-label">成功</span>
        <strong id="summary-success">0</strong>
      </article>
      <article class="call-log-summary-card">
        <span class="call-log-summary-label">失败</span>
        <strong id="summary-fail">0</strong>
      </article>
      <article class="call-log-summary-card">
        <span class="call-log-summary-label">平均耗时</span>
        <strong id="summary-avg">0 ms</strong>
      </article>
    </section>

    <section class="call-log-panel">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <h3 class="text-lg font-semibold">账号排行</h3>
        <span id="accounts-count" class="text-xs text-[var(--accents-4)]"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="geist-table min-w-[920px]">
          <thead>
            <tr>
              <th class="text-left">Email</th>
              <th class="text-left">Token</th>
              <th class="text-center">Pool</th>
              <th class="text-center">调用次数</th>
              <th class="text-center">成功</th>
              <th class="text-center">失败</th>
              <th class="text-center">平均耗时</th>
              <th class="text-center">最近调用</th>
            </tr>
          </thead>
          <tbody id="accounts-table-body"></tbody>
        </table>
      </div>
    </section>

    <section class="call-log-panel">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <h3 class="text-lg font-semibold">调用明细</h3>
        <span id="logs-count" class="text-xs text-[var(--accents-4)]"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="geist-table min-w-[1280px]">
          <thead>
            <tr>
              <th class="text-left">时间</th>
              <th class="text-center">状态</th>
              <th class="text-left">接口类型</th>
              <th class="text-left">模型</th>
              <th class="text-left">账号</th>
              <th class="text-left">Token</th>
              <th class="text-center">Pool</th>
              <th class="text-center">耗时</th>
              <th class="text-left">Trace ID</th>
              <th class="text-left">错误</th>
            </tr>
          </thead>
          <tbody id="logs-table-body"></tbody>
        </table>
      </div>
      <div class="call-log-pagination">
        <button id="page-prev" type="button" class="geist-button-outline text-xs px-3" onclick="changePage(-1)">上一页</button>
        <span id="page-info" class="text-xs text-[var(--accents-4)]">第 1 / 1 页</span>
        <button id="page-next" type="button" class="geist-button-outline text-xs px-3" onclick="changePage(1)">下一页</button>
      </div>
    </section>

    <div id="confirm-overlay" class="modal-overlay hidden">
      <div class="modal-content" style="max-width: 400px;">
        <h3 class="modal-title" id="confirm-title">确认操作</h3>
        <p class="text-sm text-[var(--accents-4)]" id="confirm-message"></p>
        <div class="modal-actions">
          <button onclick="closeConfirm()" class="geist-button-outline">取消</button>
          <button onclick="confirmAction()" class="geist-button-danger">确认</button>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>
  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.7.0"></script>
  <script src="/static/common/js/header.js?v=1.7.3"></script>
  <script src="/static/common/js/footer.js?v=1.7.0"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/call-logs.js?v=1.7.3"></script>
</body>
</html>
