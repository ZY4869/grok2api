<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - Grok2API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/common/css/common.css?v=1.7.0">
  <link rel="stylesheet" href="/static/admin/css/token.css?v=1.7.0">
  <link rel="stylesheet" href="/static/admin/css/account.css?v=1.8.4">
  <link rel="stylesheet" href="/static/common/css/toast.css">
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="app-header"></div>
  <main class="account-page-main space-y-6 flex-1 w-full mx-auto py-8 fade-in" style="padding-top: 5rem;">
    <div class="flex justify-between items-center flex-wrap gap-3">
      <div>
        <h2 class="text-2xl font-semibold">账号管理</h2>
        <p class="text-[var(--accents-4)] mt-1 text-sm">账号存储、CSV 导入导出、Email 维护与批量管理</p>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <a href="/admin/config#config-section-account" class="geist-button-outline gap-2">
          <span>定时检测设置</span>
        </a>
        <button onclick="exportTokens()" class="geist-button-outline gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <span>导出</span>
        </button>
        <button onclick="openImportModal()" class="geist-button-outline gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>导入</span>
        </button>
        <button onclick="addToken()" class="geist-button gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          <span>添加</span>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-3 flex-wrap">
      <button onclick="refreshSelectedOrAllRealQuota()" class="geist-button-outline gap-2" id="btn-refresh-real-quota">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3.2-6.91"></path>
          <polyline points="21 3 21 9 15 9"></polyline>
        </svg>
        真实额度
      </button>
      <button onclick="checkAllAlive()" class="geist-button gap-2" id="btn-check-all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        全部检测
      </button>
      <button onclick="batchEnable()" class="geist-button-outline gap-2 text-xs px-3">启用选中</button>
      <button onclick="batchDisable()" class="geist-button-outline gap-2 text-xs px-3">禁用选中</button>
      <button onclick="batchEnableNSFW()" class="geist-button-outline gap-2 text-xs px-3">开启 NSFW</button>
      <button onclick="cleanExpired()" class="geist-button-danger gap-2" id="btn-clean">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        清理失效
      </button>
      <div id="check-progress" class="hidden text-xs text-[var(--accents-4)] ml-2"></div>
    </div>

    <div class="account-table-wrap">
      <table class="geist-table account-table w-full">
        <colgroup>
          <col class="account-col-check">
          <col class="account-col-token">
          <col class="account-col-email">
          <col class="account-col-pool">
          <col class="account-col-alive">
          <col class="account-col-nsfw">
          <col class="account-col-local-quota">
          <col class="account-col-real-quota">
          <col class="account-col-last-check">
          <col class="account-col-actions">
        </colgroup>
        <thead>
          <tr>
            <th class="w-10">
              <input type="checkbox" id="select-all" class="checkbox" onclick="toggleSelectAll()">
            </th>
            <th class="w-56 text-left">Token</th>
            <th class="w-48 text-left">Email</th>
            <th class="w-24 text-center">类型</th>
            <th class="w-20 text-center">可用</th>
            <th class="w-16 text-center">NSFW</th>
            <th class="w-16 text-center">本地额度</th>
            <th class="w-64 text-left real-quota-header-cell">
              <div class="real-quota-header">
                <span class="real-quota-header-title">真实额度</span>
              </div>
            </th>
            <th class="w-36 text-center">可用检测</th>
            <th class="w-40 text-center">操作</th>
          </tr>
        </thead>
        <tbody id="account-table-body"></tbody>
      </table>
    </div>
    <div id="empty-state" class="hidden text-center py-12 text-[var(--accents-4)] text-sm">暂无账号数据</div>

    <div id="import-modal" class="modal-overlay hidden">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3 class="modal-title">导入 Token</h3>
          <button onclick="closeImportModal()" class="modal-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="space-y-4">
          <div>
            <label class="modal-label mb-1 block">目标 Pool</label>
            <select id="import-pool" class="geist-input">
              <option value="ssoBasic">ssoBasic</option>
              <option value="ssoSuper">ssoSuper</option>
            </select>
          </div>
          <div>
            <label class="modal-label mb-1 block">上传 CSV 文件（可选）</label>
            <div class="flex items-center gap-2">
              <input type="file" id="import-csv" accept=".csv" class="geist-input text-xs" onchange="handleCsvUpload(event)">
              <button onclick="downloadTemplate()" class="geist-button-outline text-xs px-3 whitespace-nowrap">下载模板</button>
            </div>
            <p class="text-xs text-[var(--accents-4)] mt-1">
              CSV 格式：`token,pool,nsfw,email`，其中 `pool/nsfw/email` 可选，页面任意位置也支持拖拽 CSV。
            </p>
            <div id="import-csv-state" class="import-feedback hidden"></div>
          </div>
          <div>
            <label class="modal-label mb-1 block">或粘贴 Token（每行一个）</label>
            <textarea id="import-text" class="geist-input font-mono h-36" placeholder="粘贴 Token，一行一个..."></textarea>
          </div>
          <div id="import-progress" class="import-progress hidden" data-tone="info"></div>
          <div class="flex justify-end gap-2 pt-2">
            <button id="import-cancel-btn" onclick="closeImportModal()" class="geist-button-outline text-xs px-3">取消</button>
            <button id="import-submit-btn" onclick="submitImport()" class="geist-button text-xs px-3">开始导入</button>
          </div>
        </div>
      </div>
    </div>

    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal-content" style="max-width: 460px;">
        <div class="modal-header">
          <h3 class="modal-title">编辑账号</h3>
          <button onclick="closeEditModal()" class="modal-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="space-y-4">
          <div>
            <label class="modal-label mb-1 block">Token</label>
            <div id="edit-token-display" class="geist-input font-mono text-xs bg-[var(--accents-1)]"></div>
          </div>
          <div>
            <label class="modal-label mb-1 block">Email</label>
            <input id="edit-email" class="geist-input" type="email" placeholder="user@example.com">
          </div>
          <div>
            <label class="modal-label mb-1 block">Pool</label>
            <select id="edit-pool" class="geist-input">
              <option value="ssoBasic">ssoBasic</option>
              <option value="ssoSuper">ssoSuper</option>
            </select>
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button onclick="closeEditModal()" class="geist-button-outline text-xs px-3">取消</button>
            <button onclick="saveEditToken()" class="geist-button text-xs px-3">保存</button>
          </div>
        </div>
      </div>
    </div>

    <div id="confirm-overlay" class="modal-overlay hidden">
      <div class="modal-content" style="max-width: 400px;">
        <h3 class="modal-title" id="confirm-title">确认操作</h3>
        <p class="text-sm text-[var(--accents-4)]" id="confirm-message"></p>
        <div class="modal-actions">
          <button onclick="closeConfirm()" class="geist-button-outline">取消</button>
          <button onclick="confirmAction()" class="geist-button-danger" id="confirm-btn">确认</button>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>
  <div id="import-drop-overlay" class="csv-drop-overlay" aria-hidden="true">
    <div class="csv-drop-overlay-card">
      <div class="csv-drop-overlay-title">释放以上传 CSV</div>
      <div class="csv-drop-overlay-desc">拖到账号管理页任意位置都可以识别，松开后会自动带入导入弹窗。</div>
    </div>
  </div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.7.0"></script>
  <script src="/static/common/js/header.js?v=1.7.3"></script>
  <script src="/static/common/js/footer.js?v=1.7.0"></script>
  <script src="/static/common/js/batch-sse.js"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/account-import.js?v=1.7.3"></script>
  <script src="/static/admin/js/account-real-quota.js?v=1.8.4"></script>
  <script src="/static/admin/js/account.js?v=1.8.4"></script>
</body>
</html>
